<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Arena Chaos Control</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-orange-400 mb-8">
      Arena Chaos Control
    </h1>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- EVENTS -->
      <div class="lg:col-span-2 space-y-6">
        <!-- Enemy Events -->
        <div class="bg-gray-800 p-5 rounded-xl">
          <h2 class="text-xl font-semibold mb-4 text-red-400">
            Enemy Events
          </h2>
          <div class="space-y-3">

            <div class="flex justify-between items-center bg-gray-700 p-3 rounded">
              <div>
                <div class="font-semibold">Spawn Enemy</div>
                <div class="text-sm text-gray-400">
                  Votes:
                  <span id="votes_SPAWN_ENEMY">0</span>
                </div>
              </div>

              <button
                onclick="vote('SPAWN_ENEMY')"
                class="bg-red-500 px-3 py-1 rounded hover:bg-red-600"
              >
                Vote
              </button>
            </div>
            <div class="flex justify-between items-center bg-gray-700 p-3 rounded">
              <div>
                <div class="font-semibold">Spawn Boss</div>
                <div class="text-sm text-gray-400">
                  Votes:
                  <span id="votes_SPAWN_BOSS">0</span>
                </div>
              </div>

              <button
                onclick="vote('SPAWN_BOSS')"
                class="bg-red-500 px-3 py-1 rounded hover:bg-red-600"
              >
                Vote
              </button>
            </div>
          </div>
        </div>
        <!-- Arena Events -->
        <div class="bg-gray-800 p-5 rounded-xl">
          <h2 class="text-xl font-semibold mb-4 text-purple-400">
            Arena Events
          </h2>
          <div class="space-y-3">
            <div class="flex justify-between items-center bg-gray-700 p-3 rounded">
              <div>
                <div class="font-semibold">Spike Trap</div>
                <div class="text-sm text-gray-400">
                  Votes:
                  <span id="votes_SPIKE_TRAP">0</span>
                </div>
              </div>

              <button
                onclick="vote('SPIKE_TRAP')"
                class="bg-purple-500 px-3 py-1 rounded hover:bg-purple-600"
              >
                Vote
              </button>
            </div>
            <div class="flex justify-between items-center bg-gray-700 p-3 rounded">
              <div>
                <div class="font-semibold">Lava Pool</div>
                <div class="text-sm text-gray-400">
                  Votes:
                  <span id="votes_LAVA_POOL">0</span>
                </div>
              </div>

              <button
                onclick="vote('LAVA_POOL')"
                class="bg-purple-500 px-3 py-1 rounded hover:bg-purple-600"
              >
                Vote
              </button>
            </div>
            <div class="flex justify-between items-center bg-gray-700 p-3 rounded">
              <div>
                <div class="font-semibold">Explosion</div>
                <div class="text-sm text-gray-400">
                  Votes:
                  <span id="votes_EXPOLOSION">0</span>
                </div>
              </div>

              <button
                onclick="vote('EXPLOSION')"
                class="bg-purple-500 px-3 py-1 rounded hover:bg-purple-600"
              >
                Vote
              </button>
            </div>
          </div>
        </div>
        <!-- Player Events -->
        <div class="bg-gray-800 p-5 rounded-xl">
          <h2 class="text-xl font-semibold mb-4 text-purple-400">
            Player Events
          </h2>
          <div class="space-y-3">
            <div class="flex justify-between items-center bg-gray-700 p-3 rounded">
              <div>
                <div class="font-semibold">Heal</div>
                <div class="text-sm text-gray-400">
                  Votes:
                  <span id="votes_HEAL">0</span>
                </div>
              </div>
              <button
                onclick="vote('HEAL')"
                class="bg-purple-500 px-3 py-1 rounded hover:bg-purple-600"
              >
                Vote
              </button>
            </div>
            <div class="flex justify-between items-center bg-gray-700 p-3 rounded">
              <div>
                <div class="font-semibold">SPEED_BOOST</div>
                <div class="text-sm text-gray-400">
                  Votes:
                  <span id="votes_SPEED_BOOST">0</span>
                </div>
              </div>

              <button
                onclick="vote('SPEED_BOOST')"
                class="bg-purple-500 px-3 py-1 rounded hover:bg-purple-600"
              >
                Vote
              </button>
            </div>
          </div>
        </div>
      </div>
      <!-- SIDE PANEL -->
      <div class="space-y-6">
        <div class="bg-gray-800 p-5 rounded-xl">
          <h2 class="text-lg font-semibold text-orange-400 mb-3">
            🎯 Triggered Events
          </h2>
          <div
            id="triggeredEvents"
            class="space-y-2 text-sm max-h-60 overflow-y-auto"
          ></div>
        </div>
        <div class="bg-gray-800 p-5 rounded-xl">
          <h2 class="text-lg font-semibold text-blue-400 mb-3">
            📡 Live Event Feed
          </h2>
          <div
            id="log"
            class="space-y-2 text-sm max-h-60 overflow-y-auto"
          ></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
