<!DOCTYPE html>
<html>
<head>
  <title>Arena Chaos Control</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🔥 Arena Chaos Control</h1>

    <input id="username" placeholder="Enter your name..." />

    <div class="buttons">
      <button onclick="sendEvent('SPAWN_ENEMY')">👾 Spawn Enemy</button>
      <button onclick="sendEvent('BOOST_PLAYER')">⚡ Boost Player</button>
      <button onclick="sendEvent('FREEZE_PLAYER')">❄ Freeze Player</button>
      <button onclick="sendEvent('METEOR_SHOWER')">☄ Meteor Shower</button>
    </div>

    <h2>📡 Live Event Feed</h2>
    <div id="log"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
