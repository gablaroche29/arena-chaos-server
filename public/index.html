<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>Arena Chaos Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <div class="page-wrap">

    <!-- HEADER -->
    <div class="header-block">
      <div class="header-sub">◄ GODOT INTEGRATION ►</div>
      <div class="main-header">⚔ Arena Chaos</div>
      <div class="status-row">
        <span><span class="status-pip"></span>SERVER ONLINE</span>
        <span class="status-sep">|</span>
        <span class="status-ws">WS: <span id="ws-status" style="color:#22c55e">CONNECTED</span></span>
      </div>
    </div>

    <div class="px-divider" style="margin-bottom:16px;"></div>

    <!-- MAIN LAYOUT: stacks on mobile, side-by-side on desktop -->
    <div class="main-grid">

      <!-- Player Card — appears first on mobile -->
      <div class="player-col">
        <div class="pixel-panel player-panel">
          <div class="corner-tl"></div><div class="corner-tr"></div><div class="corner-bl"></div><div class="corner-br"></div>
          <div class="section-title" style="color:var(--yellow); font-size:1.35rem;">
            <span>Player</span>
          </div>

          <div class="player-identity">
            <div class="avatar-box">⚔</div>
            <div class="player-name-wrap">
              <div class="player-label">Username</div>
              <div id="player-name" class="player-name">—</div>
            </div>
          </div>

          <div class="px-divider" style="margin-bottom:14px;"></div>

          <div class="token-label">Vote Tokens</div>

          <div class="token-pips">
            <div class="token-pip filled" id="pip-0">⬡</div>
            <div class="token-pip filled" id="pip-1">⬡</div>
            <div class="token-pip filled" id="pip-2">⬡</div>
          </div>

          <div class="regen-row">
            <div class="regen-label">REGEN</div>
            <div class="regen-track">
              <div class="regen-fill" id="regen-bar"></div>
            </div>
            <div id="regen-timer" class="regen-timer">—</div>
          </div>

          <div class="token-hint">MAX 3 · +1 / 3s</div>
        </div>
      </div>

      <!-- Events col -->
      <div class="events-col">

        <!-- ENEMY EVENTS -->
        <div class="pixel-panel" style="padding:16px; border-radius:2px;">
          <div class="corner-tl"></div><div class="corner-tr"></div><div class="corner-bl"></div><div class="corner-br"></div>
          <div class="section-title" style="color:#ef4444;">
            <span>Enemy Events</span>
            <span class="dot" style="background:#ef4444;"></span>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <div class="vote-row" style="border-radius:2px;">
              <div class="bar-fill" id="bar_SPAWN_ENEMY"></div>
              <div style="position:relative;">
                <div class="vote-name" style="color:#fca5a5;">Spawn Enemy</div>
                <div class="vote-count">Votes: <span id="votes_SPAWN_ENEMY">0</span></div>
              </div>
              <button onclick="vote('SPAWN_ENEMY')" class="btn-vote red" style="border-radius:2px;">[ VOTE ]</button>
            </div>
          </div>
        </div>

        <!-- ARENA EVENTS -->
        <div class="pixel-panel" style="padding:16px; border-radius:2px;">
          <div class="corner-tl"></div><div class="corner-tr"></div><div class="corner-bl"></div><div class="corner-br"></div>
          <div class="section-title" style="color:#c084fc;">
            <span>Arena Events</span>
            <span class="dot" style="background:#c084fc;"></span>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <div class="vote-row" style="border-radius:2px;">
              <div class="bar-fill" id="bar_SPAWN_TRAP"></div>
              <div style="position:relative;">
                <div class="vote-name" style="color:#d8b4fe;">Spawn Trap</div>
                <div class="vote-count">Votes: <span id="votes_SPAWN_TRAP">0</span></div>
              </div>
              <button onclick="vote('SPAWN_TRAP')" class="btn-vote purple" style="border-radius:2px;">[ VOTE ]</button>
            </div>
            <div class="vote-row" style="border-radius:2px;">
              <div class="bar-fill" id="bar_EXPOLOSION"></div>
              <div style="position:relative;">
                <div class="vote-name" style="color:#d8b4fe;">Explosion</div>
                <div class="vote-count">Votes: <span id="votes_EXPOLOSION">0</span></div>
              </div>
              <button onclick="vote('EXPLOSION')" class="btn-vote purple" style="border-radius:2px;">[ VOTE ]</button>
            </div>
          </div>
        </div>

      </div><!-- /events-col -->

    </div><!-- /main-grid -->
  </div><!-- /page-wrap -->

  <script src="app.js"></script>
</body>
</html>
