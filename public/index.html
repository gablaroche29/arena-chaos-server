<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Arena Chaos Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <div style="max-width:1000px; margin:0 auto; padding:24px 16px;">

    <!-- HEADER -->
    <div style="margin-bottom:22px;">
      <div class="header-sub">◄ GODOT INTEGRATION ►</div>
      <div class="main-header">⚔ Arena Chaos Control</div>
      <div style="display:flex; align-items:center; gap:20px; margin-top:8px; font-family:'VT323',monospace; font-size:1.1rem; letter-spacing:0.1em;">
        <span><span class="status-pip"></span>SERVER ONLINE</span>
        <span style="color:rgba(255,255,255,0.25)">|</span>
        <span style="color:rgba(255,255,255,0.45)">WS: <span id="ws-status" style="color:#22c55e">CONNECTED</span></span>
      </div>
    </div>

    <div class="px-divider" style="margin-bottom:20px;"></div>

    <!-- MAIN GRID -->
    <div style="display:grid; grid-template-columns:1fr 280px; gap:16px; align-items:start;">

      <!-- LEFT: Events -->
      <div style="display:flex; flex-direction:column; gap:14px;">

        <!-- ENEMY EVENTS -->
        <div class="pixel-panel" style="padding:18px; border-radius:2px;">
          <div class="corner-tl"></div><div class="corner-tr"></div><div class="corner-bl"></div><div class="corner-br"></div>
          <div class="section-title" style="color:#ef4444;">
            <span>💀 Enemy Events</span>
            <span class="dot" style="background:#ef4444;"></span>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <div class="vote-row" style="border-radius:2px;">
              <div class="bar-fill" id="bar_SPAWN_ENEMY"></div>
              <div style="position:relative;">
                <div class="vote-name" style="color:#fca5a5;">Spawn Enemy</div>
                <div class="vote-count">Votes: <span id="votes_SPAWN_ENEMY">0</span></div>
              </div>
              <button onclick="vote('SPAWN_ENEMY')" class="btn-vote red" style="border-radius:2px;">[ VOTE ]</button>
            </div>
          </div>
        </div>

        <!-- ARENA EVENTS -->
        <div class="pixel-panel" style="padding:18px; border-radius:2px;">
          <div class="corner-tl"></div><div class="corner-tr"></div><div class="corner-bl"></div><div class="corner-br"></div>
          <div class="section-title" style="color:#c084fc;">
            <span>🌋 Arena Events</span>
            <span class="dot" style="background:#c084fc;"></span>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <div class="vote-row" style="border-radius:2px;">
              <div class="bar-fill" id="bar_SPIKE_TRAP"></div>
              <div style="position:relative;">
                <div class="vote-name" style="color:#d8b4fe;">Spike Trap</div>
                <div class="vote-count">Votes: <span id="votes_SPIKE_TRAP">0</span></div>
              </div>
              <button onclick="vote('SPIKE_TRAP')" class="btn-vote purple" style="border-radius:2px;">[ VOTE ]</button>
            </div>
            <div class="vote-row" style="border-radius:2px;">
              <div class="bar-fill" id="bar_EXPOLOSION"></div>
              <div style="position:relative;">
                <div class="vote-name" style="color:#d8b4fe;">Explosion</div>
                <div class="vote-count">Votes: <span id="votes_EXPOLOSION">0</span></div>
              </div>
              <button onclick="vote('EXPLOSION')" class="btn-vote purple" style="border-radius:2px;">[ VOTE ]</button>
            </div>
          </div>
        </div>

      </div>

      <!-- RIGHT: Player Card -->
      <div class="pixel-panel" style="padding:18px; border-radius:2px;">
        <div class="corner-tl"></div><div class="corner-tr"></div><div class="corner-bl"></div><div class="corner-br"></div>
        <div class="section-title" style="color:var(--yellow); font-size:1.35rem;">
          <span>👤 Player</span>
        </div>

        <!-- Avatar + name -->
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:18px;">
          <div class="avatar-box">⚔</div>
          <div style="overflow:hidden;">
            <div style="color:rgba(255,255,255,0.35); font-size:0.9rem; letter-spacing:0.2em; text-transform:uppercase;">Username</div>
            <div id="player-name" style="color:var(--yellow); font-size:1.7rem; letter-spacing:0.06em; text-transform:uppercase; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">—</div>
          </div>
        </div>

        <div class="px-divider" style="margin-bottom:16px;"></div>

        <!-- Vote tokens label -->
        <div style="color:rgba(255,255,255,0.35); font-size:0.95rem; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:8px;">Vote Tokens</div>

        <!-- Pips -->
        <div style="display:flex; gap:8px; margin-bottom:12px;">
          <div class="token-pip filled" id="pip-0">⬡</div>
          <div class="token-pip filled" id="pip-1">⬡</div>
          <div class="token-pip filled" id="pip-2">⬡</div>
        </div>

        <!-- Regen bar -->
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
          <div style="color:rgba(255,255,255,0.25); font-size:0.9rem; letter-spacing:0.1em; white-space:nowrap;">REGEN</div>
          <div class="regen-track">
            <div class="regen-fill" id="regen-bar"></div>
          </div>
          <div id="regen-timer" style="color:rgba(255,209,102,0.45); font-size:0.9rem; min-width:22px; text-align:right; letter-spacing:0.05em;">—</div>
        </div>

        <div style="color:rgba(255,255,255,0.15); font-size:0.95rem; text-align:center; letter-spacing:0.12em; margin-top:4px;">
          MAX 3 · +1 / 3s
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
