<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>Authentication | Arena Chaos</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <style>
    :root {
      --yellow: #ffd166;
      --bg:     #0d0d0f;
      --panel:  #13131a;
      --border: #2a2a3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: #e0e0e0;
      font-family: 'VT323', monospace;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background-image:
        repeating-linear-gradient(0deg,   transparent, transparent 31px, rgba(255,209,102,0.03) 32px),
        repeating-linear-gradient(90deg,  transparent, transparent 31px, rgba(255,209,102,0.03) 32px);
      background-size: 32px 32px;
      -webkit-text-size-adjust: 100%;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.18) 4px
      );
      z-index: 999;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 2px solid var(--border);
      box-shadow: 0 0 0 2px var(--bg), inset 0 0 40px rgba(0,0,0,0.5);
      padding: 32px 28px 28px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle inner glow */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Pixel corner decorations */
    .corner { position: absolute; width: 12px; height: 12px; pointer-events: none; }
    .corner-tl { top:0; left:0;  border-top:3px solid var(--yellow); border-left:3px solid var(--yellow);   opacity:.45; }
    .corner-tr { top:0; right:0; border-top:3px solid var(--yellow); border-right:3px solid var(--yellow);  opacity:.45; }
    .corner-bl { bottom:0; left:0;  border-bottom:3px solid var(--yellow); border-left:3px solid var(--yellow);  opacity:.45; }
    .corner-br { bottom:0; right:0; border-bottom:3px solid var(--yellow); border-right:3px solid var(--yellow); opacity:.45; }

    /* ── Header ── */
    .eyebrow {
      font-size: 1rem;
      letter-spacing: 0.3em;
      color: rgba(255,209,102,0.4);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .title {
      font-size: 2.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--yellow);
      text-shadow: 4px 4px 0 rgba(255,209,102,0.12), 0 0 40px rgba(255,209,102,0.18);
      line-height: 1;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1.15rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
      margin-bottom: 24px;
    }

    /* Dashed divider */
    .divider {
      height: 2px;
      background: repeating-linear-gradient(90deg, var(--border) 0px, var(--border) 8px, transparent 8px, transparent 12px);
      margin-bottom: 24px;
    }

    /* ── Form ── */
    .field-label {
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 6px;
      display: block;
    }

    .field-input {
      width: 100%;
      background: rgba(0,0,0,0.45);
      border: 2px solid var(--border);
      color: var(--yellow);
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      /* remove iOS rounding */
      -webkit-appearance: none;
      border-radius: 0;
    }

    .field-input::placeholder {
      color: rgba(255,209,102,0.2);
      letter-spacing: 0.05em;
    }

    .field-input:focus {
      border-color: rgba(255,209,102,0.6);
      box-shadow: 0 0 0 1px rgba(255,209,102,0.15), inset 0 0 12px rgba(255,209,102,0.04);
    }

    /* Blinking cursor effect on focus */
    .field-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .field-wrap::after {
      content: '▮';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,209,102,0.3);
      font-size: 1rem;
      pointer-events: none;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      font-family: 'VT323', monospace;
      font-size: 1.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #0d0d0f;
      background: var(--yellow);
      border: 2px solid var(--yellow);
      box-shadow: 4px 4px 0 rgba(255,209,102,0.25);
      padding: 10px 0;
      cursor: pointer;
      transition: all 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      border-radius: 0;
    }

    .btn-submit:hover {
      background: #ffe08a;
      border-color: #ffe08a;
      box-shadow: 4px 4px 0 rgba(255,209,102,0.35);
    }

    .btn-submit:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 rgba(255,209,102,0.2);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="eyebrow">◄ Player Identification ►</div>
    <div class="title">⚔ Arena Chaos</div>
    <div class="subtitle">Enter your username to join the arena.</div>

    <div class="divider"></div>

    <form action="/api/auth/register" method="POST">
      <label for="username" class="field-label">Username</label>
      <div class="field-wrap">
        <input
          type="text"
          id="username"
          name="username"
          required
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          class="field-input"
          placeholder="your_username..."
        />
      </div>

      <button type="submit" class="btn-submit">[ Enter Arena ]</button>
    </form>
  </div>
</body>
</html>
