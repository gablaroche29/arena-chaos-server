<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Arena Chaos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen text-slate-100">

    <div class="w-full max-w-md p-8 bg-slate-800 rounded-lg shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold mb-6 text-yellow-500 font-mono tracking-wider">
            Arena Chaos Login
        </h1>
        <p class="mb-6 text-slate-400">Please provide a valid identification username to proceed.</p>

        <form action="/api/auth/register" method="POST" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    class="w-full mt-1 p-3 bg-slate-900 border border-slate-600 rounded focus:ring-2 focus:ring-yellow-500 focus:outline-none transition-all"
                    placeholder="Enter your handle..."
                >
            </div>

            <button
                type="submit"
                class="w-full py-3 bg-yellow-600 hover:bg-yellow-500 text-slate-900 font-bold rounded transition-colors"
            >
                Commencer
            </button>
        </form>
    </div>

</body>
</html>
